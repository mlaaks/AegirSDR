id: Aegir_AegirSDR
label: AegirSDR Source
category: '[Aegir]'

templates:
  imports: from gnuradio import Aegir
  make: Aegir.AegirSDR(${address}, ${ctrl_address}, ${nchannels}, ${blocksize}, ${frequency}, ${samplerate}, ${gain}, ${timeout_ms})
  callbacks:
  - set_frequency(${frequency})
  - set_samplerate(${samplerate})
  - set_gain(${gain})

parameters:
- id: address
  label: Data Address
  dtype: string
  default: tcp://localhost:5555
- id: ctrl_address
  label: Control Address
  dtype: string
  default: tcp://localhost:5556
- id: nchannels
  label: Number of Channels
  dtype: int
  default: 2
- id: blocksize
  label: Block Size (complex samples)
  dtype: int
  default: 8192
- id: frequency
  label: Frequency (Hz)
  dtype: real
  default: 100e6
- id: samplerate
  label: Sample Rate (Hz)
  dtype: real
  default: 2048000
- id: gain
  label: Tuner Gain (dB)
  dtype: float
  default: 30
- id: timeout_ms
  label: Timeout (ms)
  dtype: int
  default: 100

inputs:

outputs:
- label: out
  dtype: complex
  multiplicity: ${ nchannels }

file_format: 1
